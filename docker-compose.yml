version: '3.8'\n\nservices:\n  postgres:\n    image: postgres:15-alpine\n    container_name: maxx-vest-postgres\n    environment:\n      POSTGRES_DB: maxx_vest_db\n      POSTGRES_USER: postgres\n      POSTGRES_PASSWORD: postgres\n    ports:\n      - \"5432:5432\"\n    volumes:\n      - postgres_data:/var/lib/postgresql/data\n    healthcheck:\n      test: [\"CMD-SHELL\", \"pg_isready -U postgres\"]\n      interval: 10s\n      timeout: 5s\n      retries: 5\n    networks:\n      - maxx-vest-network\n\n  redis:\n    image: redis:7-alpine\n    container_name: maxx-vest-redis\n    ports:\n      - \"6379:6379\"\n    volumes:\n      - redis_data:/data\n    healthcheck:\n      test: [\"CMD\", \"redis-cli\", \"ping\"]\n      interval: 10s\n      timeout: 5s\n      retries: 5\n    networks:\n      - maxx-vest-network\n\n  api:\n    build:\n      context: ./backend/maxx-vest-api\n      dockerfile: Dockerfile\n    container_name: maxx-vest-api\n    environment:\n      DB_HOST: postgres\n      DB_PORT: 5432\n      DB_NAME: maxx_vest_db\n      DB_USER: postgres\n      DB_PASSWORD: postgres\n      REDIS_HOST: redis\n      REDIS_PORT: 6379\n      JWT_SECRET: your-super-secret-key-min-32-characters-long\n    ports:\n      - \"8080:8080\"\n    depends_on:\n      postgres:\n        condition: service_healthy\n      redis:\n        condition: service_healthy\n    networks:\n      - maxx-vest-network\n\nvolumes:\n  postgres_data:\n  redis_data:\n\nnetworks:\n  maxx-vest-network:\n    driver: bridge\n